name: Gem Upgrade Review
on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    paths:
      - "Gemfile"
      - "Gemfile.lock"
      - "*.gemspec"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-gems:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      GEM_REVIEW_PATH: gem_review.md
      # Add your API key here (Make sure to add this secret in GitHub Repo Settings)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Generate dependency review comment
        run: ruby .github/scripts/gem_diff.rb

      - name: Comment on PR with dependency summary
        if: github.event.pull_request != null
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: ${{ env.GEM_REVIEW_PATH }}